<style>
  :root{--ink:#1c2230;--sub:#6b7280;--line:#e7e9ee;--bg:#f6f7f9;--accent:#27344f;}
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 18px 80px;}
  .hero{background:linear-gradient(135deg,#27344f,#3c4d70);color:#fff;padding:46px 18px;}

  .hero h1{font-size:30px;margin:0 0 8px;font-weight:800;letter-spacing:.5px;}
  .hero p{margin:0;opacity:.85;font-size:14.5px;line-height:1.65;}
  .hero-cta{display:inline-flex;align-items:center;gap:8px;background:#fff;color:#27344f;font-weight:800;font-size:14.5px;padding:13px 22px;border-radius:30px;box-shadow:0 4px 14px rgba(0,0,0,.18);white-space:nowrap;transition:.15s;}

  .hero-cta svg{width:16px;height:16px;fill:currentColor;}
  .hero-ctas{display:flex;flex-direction:column;gap:10px;}
  .cats{display:flex;gap:9px;margin:26px 0 4px;flex-wrap:wrap;}

  .subs{display:flex;gap:8px;margin:16px 0 14px;flex-wrap:wrap;}

  .sub .n{opacity:.6;font-weight:500;margin-left:4px;font-size:12px;}
  .catdesc{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:10px;padding:11px 16px;margin:2px 0 20px;font-size:13.5px;color:var(--ink);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(208px,1fr));gap:16px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:13px;overflow:hidden;display:flex;flex-direction:column;transition:.16s;}
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(28,34,48,.09);border-color:#cdd3dc;}
  .thumb{position:relative;aspect-ratio:1/1;background:#f4f5f7;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;background:#fff;}
  .thumb .ini{font-size:26px;font-weight:800;color:#cdd4dd;}
  .body{padding:13px 13px 15px;flex:1;display:flex;flex-direction:column;}
  .nm{font-size:13.5px;font-weight:700;line-height:1.35;word-break:keep-all;}
  .gtag{font-size:11px;color:#9aa0a8;margin-bottom:4px;font-weight:600;}
  .meta{margin-top:9px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;background:#f1f3f6;border-radius:20px;padding:3px 9px 3px 6px;}
  .chip i{width:11px;height:11px;border-radius:50%;display:inline-block;}
  .onshow{font-size:11px;font-weight:700;color:#1f9d6b;background:#e8f6ef;border-radius:14px;padding:2px 9px;}
  .cardfoot{margin-top:auto;padding-top:10px;display:flex;align-items:center;gap:6px;}
  .code{margin-left:auto;font-size:11px;font-weight:800;color:var(--accent);background:#eef1f6;border:1px solid #dce2ec;border-radius:7px;padding:2px 8px;letter-spacing:.3px;}
  .search{position:relative;margin:22px 0 2px;}
  .search input{width:100%;font-size:16px;padding:14px 18px 14px 46px;border:1.5px solid var(--line);border-radius:30px;background:#fff;outline:none;font-family:inherit;}
  .search input:focus{border-color:#aab6cc;}
  .search svg{position:absolute;left:17px;top:50%;transform:translateY(-50%);width:20px;height:20px;fill:#9aa0a8;}
  .search .hint{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:12px;color:#b0b6bf;}
  .rescount{margin:14px 2px 4px;font-size:13px;color:var(--sub);}
  .empty{color:var(--sub);font-size:14px;padding:40px 0;text-align:center;}
  .foot{margin-top:50px;text-align:center;color:var(--sub);font-size:12px;line-height:1.7;}

const COLOR_HEX = {"navy":"#27344f","blue":"#3f6fb5","teal":"#2f8f8f","gray":"#8a8f96","grey":"#8a8f96","pink":"#e7a6bd","black":"#222","white":"#f3f3f3","lavender gray":"#9a96b5","lavender":"#b3a7d6","coral":"#f08a7a","sea-island":"#cfe0e6","네이비":"#27344f","차콜그레이":"#4b4f57","민트그레이":"#9bb7ae","그레이":"#8a8f96","핑크":"#e7a6bd","블랙":"#222","화이트":"#f3f3f3","라벤더":"#b3a7d6"};
let curCat = Object.keys(CATALOG)[0], curSub = null;

const SEARCH = (()=>{
  const seen = {}; const out = [];
  Object.keys(CATALOG).forEach(cat=>{
    const g = CATALOG[cat].groups;
    Object.keys(g).forEach(grp=>{ if(grp==='전체보기') return; g[grp].forEach(p=>{
      if(seen[p.url]) return; seen[p.url]=1;
      out.push(Object.assign({cat, grp}, p));
    }); });
  });
  return out;
})();

function chip(c){
  if(!c) return '';
  const hex = COLOR_HEX[c.toLowerCase()] || COLOR_HEX[c] || '#d7b46a';
  const ring = /white|화이트/i.test(c) ? 'border:1px solid #ccc;' : '';
  return '<span class="chip"><i style="background:'+hex+';'+ring+'"></i>'+c+'</span>';
}
function cardHTML(p, opt){
  opt = opt || {};
  const isSample = !!p.sampleNo;
  const onshowEl = isSample ? '<span class="onshow">● 전시중</span>' : '';
  const codeEl = (isSample && p.code) ? '<span class="code">'+p.code+'</span>' : '';
  const footEl = (onshowEl || codeEl) ? '<div class="cardfoot">'+onshowEl+codeEl+'</div>' : '';
  const thumb = p.thumb
    ? '<img class="ph" loading="lazy" src="'+p.thumb+'" alt="" onerror="this.remove()"><span class="ini">'+(p.initial||'')+'</span>'
    : '<span class="ini">'+(p.initial||'')+'</span>';
  return '<a class="card" href="'+p.url+'" target="_blank" rel="noopener">'+
    '<div class="thumb">'+thumb+'</div>'+
    '<div class="body">'+
      (opt.showGroup?'<div class="gtag">'+p.cat+' · '+p.grp+'</div>':'')+
      '<div class="nm">'+p.disp+'</div>'+
      (p.color?'<div class="meta">'+chip(p.color)+'</div>':'')+
      footEl+
    '</div></a>';
}
function render(){
  const q = (document.getElementById('q').value||'').trim().toLowerCase();
  const cats = document.getElementById('cats'), subs = document.getElementById('subs');
  const grid = document.getElementById('grid'), rc = document.getElementById('rescount'), cd = document.getElementById('catdesc');
  document.getElementById('hint').textContent = q ? '' : SEARCH.length+'개 추천';

  if(q){
    cats.style.display='none'; subs.style.display='none'; cd.style.display='none'; rc.style.display='block';
    const qNorm = q.replace(/[\s-]/g,'');
    const res = SEARCH.filter(p=>{
      if(p.disp.toLowerCase().includes(q)) return true;
      if(p.code && p.code.toLowerCase().replace(/-/g,'').includes(qNorm) && qNorm) return true;
      if((p.cat+p.grp).toLowerCase().includes(q)) return true;
      if(p.color && p.color.toLowerCase().includes(q)) return true;
      return false;
    });
    rc.textContent = '"'+q+'" 검색결과 '+res.length+'개';
    grid.innerHTML = res.length ? res.map(p=>cardHTML(p,{showGroup:true})).join('') : '<div class="empty">검색 결과가 없습니다</div>';
    return;
  }
  cats.style.display='flex'; subs.style.display='flex'; rc.style.display='none';
  cats.innerHTML = Object.keys(CATALOG).map(c=>
    '<div class="cat '+(c===curCat?'on':'')+'" onclick="pickCat(\''+c+'\')">'+c+'</div>').join('');
  const cur = CATALOG[curCat], groups = cur.groups, keys = Object.keys(groups);
  if(!curSub || !groups[curSub]) curSub = keys[0];
  subs.innerHTML = keys.map(k=>
    '<div class="sub '+(k===curSub?'on':'')+'" onclick="pickSub(\''+k+'\')">'+k+'<span class="n">'+groups[k].length+'</span></div>').join('');
  cd.style.display='flex';
  cd.innerHTML = '<b>'+curSub+'</b><span class="bar">|</span>'+cur.desc;
  const items = groups[curSub] || [];
  grid.innerHTML = items.length ? items.map(p=>cardHTML(p,{})).join('') : '<div class="empty">준비 중입니다</div>';
}
function pickCat(c){ curCat=c; curSub=null; render(); }
function pickSub(s){ curSub=s; render(); }
document.getElementById('q').addEventListener('input', render);
render();
</script>
</body></html>
